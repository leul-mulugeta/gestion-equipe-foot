name: Deploy auth
on:
  push:
    branches: ["main"]
    paths: ["auth/**"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@v9
        with:
          switches: >-
            -avzr --delete
            --exclude=Dockerfile
            --exclude=.dockerignore
          path: auth/
          remote_path: ${{ secrets.ALWAYSDATA_AUTH_PATH }}
          remote_host: ${{ secrets.ALWAYSDATA_SSH_HOST }}
          remote_user: ${{ secrets.ALWAYSDATA_SSH_USER }}
          remote_key: ${{ secrets.ALWAYSDATA_SSH_KEY }}
